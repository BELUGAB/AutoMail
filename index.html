<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Candidatures Auto — Prêt à l'envoi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f0e8; --ink: #1a1612; --accent: #c94f2b; --border: #d4cdc2; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); padding: 40px 20px; text-align: center; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border: 1px solid var(--border); border-radius: 8px; }
        h1 { font-family: 'DM Serif Display', serif; margin-bottom: 20px; }
        .drop-zone { border: 2px dashed var(--border); padding: 30px; margin-bottom: 20px; cursor: pointer; background: #fafafa; }
        textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; height: 100px; margin-bottom: 20px; }
        .contact-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .btn-open { padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-open:visited { background: #5c5347; }
        #list { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h1>Candidatures Express</h1>
    <p>Glisse ton CSV, et clique sur chaque bouton pour envoyer.</p>

    <div class="drop-zone" onclick="document.getElementById('csv-in').click()">
        <input type="file" id="csv-in" accept=".csv" hidden>
        <div id="csv-label">📁 Charger le fichier CSV</div>
    </div>

    <textarea id="mail-body">Bonjour {{prenom}}, je postule chez {{entreprise}}. Mon portfolio est en pièce jointe.</textarea>

    <div id="list"></div>
</div>

<script>
document.getElementById('csv-in').onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
        const lines = reader.result.split('\n');
        const sep = lines[0].includes(';') ? ';' : ',';
        const headers = lines[0].split(sep).map(h => h.trim().replace(/"/g,''));
        const emailIdx = headers.indexOf('Email');
        const compIdx = headers.indexOf('Company Name');
        const firstIdx = headers.indexOf('First Name');

        const contacts = lines.slice(1).filter(l => l.trim()).map(line => {
            const cells = line.split(sep).map(c => c.trim().replace(/"/g,''));
            return { email: cells[emailIdx], company: cells[compIdx] || "", name: cells[firstIdx] || "" };
        }).filter(c => c.email);

        renderList(contacts);
    };
    reader.readAsText(e.target.files[0]);
};

function renderList(contacts) {
    const list = document.getElementById('list');
    const bodyTpl = document.getElementById('mail-body').value;
    list.innerHTML = "<strong>Clique sur chaque bouton (ils changeront de couleur après l'envoi) :</strong><br><br>";

    contacts.forEach(c => {
        const subject = encodeURIComponent(`Candidature — ${c.company}`);
        const body = encodeURIComponent(bodyTpl.replace('{{prenom}}', c.name).replace('{{entreprise}}', c.company));
        const mailto = `mailto:${c.email}?subject=${subject}&body=${body}`;

        const row = document.createElement('div');
        row.className = 'contact-row';
        row.innerHTML = `
            <span>${c.company} (${c.email})</span>
            <a href="${mailto}" class="btn-open" onclick="this.style.background='#ccc'">OUVRIR GMAIL</a>
        `;
        list.appendChild(row);
    });
}
</script>
</body>
</html>
